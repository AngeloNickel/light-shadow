<title>HEROINE &mdash; LIGHT / SHADOW</title>

<style>
  :root {
    --void:   #0B0910;
    --edge:   #2A2238;
    --gold:   #E9A63C;
    --ember:  #FBEBC4;
    --warm:   #D7A159;
    --text:   #DED5C4;
    --muted:  #8C8173;
    --faint:  #5C5548;
    --display: Constantia, "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
    --data:    Consolas, "Cascadia Mono", "SF Mono", ui-monospace, monospace;
  }

  /* single visual world by design: the viewer's light is the only source */

  body {
    background: var(--void);
    color: var(--text);
    font-family: Georgia, serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .shell { max-width: 880px; margin: 0 auto; padding: 0 24px 56px; }

  .masthead { display: flex; flex-direction: column; gap: 10px; padding: 46px 0 22px; }
  .eyebrow {
    font-family: var(--data); font-size: 11px; letter-spacing: 0.26em;
    text-transform: uppercase; color: var(--faint);
  }
  h1 {
    font-family: var(--display); font-weight: 400;
    font-size: clamp(30px, 5.4vw, 46px);
    letter-spacing: 0.26em; text-transform: uppercase;
    margin-left: 0.13em; line-height: 1; color: var(--text);
  }
  .rule { height: 1px; border: 0; background: linear-gradient(90deg, var(--edge), transparent); }

  .stage {
    position: relative;
    height: clamp(440px, 68vh, 620px);
    margin-top: 10px;
    border-radius: 2px;
    overflow: hidden;
    cursor: none;
    background:
      radial-gradient(120% 90% at 50% 108%, #171226 0%, transparent 60%),
      linear-gradient(180deg, #06050A 0%, var(--void) 55%, #0E0A16 100%);
    touch-action: none;
  }
  .stage:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

  .wall-glow {
    position: absolute; inset: 0;
    background: radial-gradient(circle var(--wall-r, 340px) at var(--lx, 30%) var(--ly, 30%),
      rgba(233,166,60,0.20) 0%, rgba(233,166,60,0.09) 34%, rgba(111,76,159,0.05) 58%, transparent 76%);
    pointer-events: none;
  }
  .floor {
    position: absolute; inset: 0;
    background: radial-gradient(
      ellipse var(--pool-w, 300px) 44px at var(--pool-x, 50%) 91.3%,
      rgba(233,166,60,0.50) 0%, rgba(233,166,60,0.19) 44%, transparent 76%);
    pointer-events: none;
  }
  .horizon {
    position: absolute; left: 6%; right: 6%; bottom: 8.7%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(233,166,60,0.20), transparent);
    pointer-events: none;
  }

  .figure-anchor {
    position: absolute;
    left: 50%; bottom: 6%;
    height: 84%;
    aspect-ratio: 449 / 832;
    transform: translateX(-50%);
    pointer-events: none;
  }

  .cast {
    position: absolute;
    left: 0; bottom: 3.25%; width: 100%;
    transform-origin: bottom center;
    transform: translateX(0) scale(1.4);
    opacity: 0.5;
    will-change: transform, opacity, filter;
  }
  .cast img { width: 100%; display: block; }

  .figure { position: relative; }
  .figure img { width: 100%; display: block; }

  .fig-dark { filter: brightness(0.30) saturate(0.42) contrast(1.06); }
  .fig-lit {
    position: absolute; inset: 0;
    -webkit-mask-image: radial-gradient(circle var(--reach, 190px) at var(--mx, 50%) var(--my, 40%),
      #000 0%, #000 30%, rgba(0,0,0,0.55) 62%, transparent 88%);
    mask-image: radial-gradient(circle var(--reach, 190px) at var(--mx, 50%) var(--my, 40%),
      #000 0%, #000 30%, rgba(0,0,0,0.55) 62%, transparent 88%);
    will-change: mask-image;
  }

  .orb {
    position: absolute;
    width: 74px; height: 74px;
    left: 0; top: 0;
    transform: translate(-50%, -50%);
    pointer-events: none;
    will-change: transform;
  }
  .orb::before {
    content: "";
    position: absolute; inset: -190%;
    background: radial-gradient(circle,
      rgba(251,235,196,0.26) 0%, rgba(233,166,60,0.14) 26%, rgba(233,166,60,0.05) 48%, transparent 68%);
    pointer-events: none;
  }
  .orb img { width: 100%; display: block; position: relative; }

  .readout {
    display: flex; flex-wrap: wrap; gap: 0 34px;
    padding: 16px 2px 0;
    font-family: var(--data); font-size: 11px;
    letter-spacing: 0.13em; text-transform: uppercase; color: var(--faint);
  }
  .readout b { font-weight: 400; color: var(--warm); font-variant-numeric: tabular-nums; }
  .hint { margin-left: auto; color: var(--faint); }
  @media (max-width: 720px) { .hint { margin-left: 0; flex-basis: 100%; } }

  @media (prefers-reduced-motion: reduce) {
    .cast { transition: none; }
  }
</style>

    <span>Lichtwinkel <b id="rAngle">0&deg;</b></span>
    <span>Schattengr&ouml;&szlig;e <b id="rLen">1.00&times;</b></span>

<script>
(function () {
  var stage  = document.getElementById("stage");
  var orb    = document.getElementById("orb");
  var cast   = document.getElementById("cast");
  var anchor = document.getElementById("anchor");
  var figLit = document.getElementById("figLit");
  var floor  = document.getElementById("floor");
  var wallGlow = document.getElementById("wallGlow");
  var rAngle = document.getElementById("rAngle");
  var rLen   = document.getElementById("rLen");
  var rHeight= document.getElementById("rHeight");

  var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // Her soles sit at 96.75% of the artwork's height; below that is only the
  // painted ground speckle. Mirrored by .cast's bottom offset in the CSS.
  var SOLE = 0.9675;

  var tx = 0, ty = 0, cx = 0, cy = 0, pointer = false, t = 0, placed = false;
  var R = null, A = null;

  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  function measure() {
    var r = stage.getBoundingClientRect();
    var a = anchor.getBoundingClientRect();
    if (r.width === 0) return false;
    R = { w: r.width, h: r.height };
    A = { x: a.left - r.left, y: a.top - r.top, w: a.width, h: a.height };
    if (!placed) { cx = tx = R.w * 0.26; cy = ty = R.h * 0.30; placed = true; }
    return true;
  }

  var lastBlur = -1, lastMx = -999, lastMy = -999;

  function update() {
    if (!R && !measure()) return;

    orb.style.transform =
      "translate(" + cx.toFixed(1) + "px," + cy.toFixed(1) + "px) translate(-50%,-50%)";

    var figCX   = A.x + A.w / 2;
    var figMidY = A.y + A.h * 0.5;
    var groundY = A.y + A.h * SOLE;
    var H       = A.h * SOLE;

    var dx = figCX - cx;
    var h  = Math.max(groundY - cy, H * 0.22);

    // point-light projection onto the plane behind her
    var dist  = Math.hypot(dx, figMidY - cy);
    var scale = clamp(1.12 + 170 / Math.max(dist, 80), 1.12, 2.35);
    var shift = dx * 0.52;

    cast.style.transform = "translateX(" + shift.toFixed(1) + "px) scale(" + scale.toFixed(3) + ")";
    cast.style.opacity   = clamp(0.66 - (scale - 1.12) * 0.16, 0.3, 0.66).toFixed(2);
    var b = Math.round(3 + scale * 3);
    if (b !== lastBlur) { cast.style.filter = "blur(" + b + "px)"; lastBlur = b; }

    wallGlow.style.setProperty("--lx", (cx / R.w * 100).toFixed(1) + "%");
    wallGlow.style.setProperty("--ly", (cy / R.h * 100).toFixed(1) + "%");
    wallGlow.style.setProperty("--wall-r", Math.round(A.h * 0.95) + "px");

    var mx = Math.round((cx - A.x) / A.w * 250) / 2.5;
    var my = Math.round((cy - A.y) / A.h * 250) / 2.5;
    if (mx !== lastMx || my !== lastMy) {
      figLit.style.setProperty("--mx", mx + "%");
      figLit.style.setProperty("--my", my + "%");
      figLit.style.setProperty("--reach", Math.max(A.h * 0.85, 150) + "px");
      lastMx = mx; lastMy = my;
    }

    floor.style.setProperty("--pool-x", (cx / R.w * 100).toFixed(1) + "%");
    floor.style.setProperty("--pool-w", clamp(190 + h * 0.6, 180, 460).toFixed(0) + "px");

    rAngle.textContent  = Math.round(-Math.atan2(dx, h) * 180 / Math.PI) + "\u00b0";
    rLen.textContent    = scale.toFixed(2) + "\u00d7";
    rHeight.textContent = Math.round(clamp((groundY - cy) / groundY, 0, 1) * 100) + "%";
  }

  function loop() {
    if (R) {
      if (!pointer && !reduced) {
        t += 0.0045;
        tx = R.w * (0.5 + 0.33 * Math.sin(t * 1.6));
        ty = R.h * (0.34 + 0.14 * Math.sin(t * 2.3 + 1.1));
      }
      var ease = reduced ? 1 : 0.075;
      cx += (tx - cx) * ease;
      cy += (ty - cy) * ease;
      update();
    } else {
      measure();
    }
    requestAnimationFrame(loop);
  }

  function moveTo(e) {
    if (!R && !measure()) return;
    var r = stage.getBoundingClientRect();
    pointer = true;
    tx = clamp(e.clientX - r.left, 8, R.w - 8);
    ty = clamp(e.clientY - r.top, 8, R.h * 0.82);
    if (reduced) { cx = tx; cy = ty; update(); }
  }

  stage.addEventListener("pointermove", moveTo);
  stage.addEventListener("pointerdown", moveTo);
  stage.addEventListener("pointerleave", function () { pointer = false; });

  stage.addEventListener("keydown", function (e) {
    var k = e.key;
    if (k !== "ArrowLeft" && k !== "ArrowRight" && k !== "ArrowUp" && k !== "ArrowDown") return;
    if (!R && !measure()) return;
    e.preventDefault();
    pointer = true;
    var step = 18;
    if (k === "ArrowLeft")  tx -= step;
    if (k === "ArrowRight") tx += step;
    if (k === "ArrowUp")    ty -= step;
    if (k === "ArrowDown")  ty += step;
    tx = clamp(tx, 8, R.w - 8);
    ty = clamp(ty, 8, R.h * 0.82);
    if (reduced) { cx = tx; cy = ty; update(); }
  });

  function remeasure() { if (measure()) update(); }
  window.addEventListener("resize", remeasure);
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) remeasure();
  });
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(remeasure);

  measure();
  update();
  requestAnimationFrame(loop);
})();
</script>
