<title>LICHT &mdash; LIGHT / SHADOW</title>

<style>
  :root {
    --void:   #0B0910;
    --edge:   #2A2238;
    --gold:   #E9A63C;
    --ember:  #FBEBC4;
    --warm:   #D7A159;
    --text:   #DED5C4;
    --muted:  #8C8173;
    --faint:  #5C5548;
    --display: Constantia, "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
    --data:    Consolas, "Cascadia Mono", "SF Mono", ui-monospace, monospace;
  }

  /* single visual world by design: the page IS the dark the companion lights up */

  body {
    background: var(--void);
    color: var(--text);
    font-family: Georgia, serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .shell { max-width: 880px; margin: 0 auto; padding: 0 24px 56px; }

  .masthead { display: flex; flex-direction: column; gap: 10px; padding: 46px 0 22px; }
  .eyebrow {
    font-family: var(--data); font-size: 11px; letter-spacing: 0.26em;
    text-transform: uppercase; color: var(--faint);
  }
  h1 {
    font-family: var(--display); font-weight: 400;
    font-size: clamp(30px, 5.4vw, 46px);
    letter-spacing: 0.26em; text-transform: uppercase;
    margin-left: 0.13em; line-height: 1; color: var(--text);
  }
  .rule { height: 1px; border: 0; background: linear-gradient(90deg, var(--edge), transparent); }

  .stage {
    position: relative;
    height: clamp(440px, 68vh, 620px);
    margin-top: 10px;
    border-radius: 2px;
    overflow: hidden;
    cursor: none;
    background:
      radial-gradient(120% 90% at 50% 108%, #171226 0%, transparent 60%),
      linear-gradient(180deg, #06050A 0%, var(--void) 55%, #0E0A16 100%);
    touch-action: none;
  }
  .stage:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

  .wall-glow {
    position: absolute; inset: 0;
    background: radial-gradient(circle var(--wall-r, 320px) at var(--lx, 50%) var(--ly, 40%),
      rgba(233,166,60,0.16) 0%, rgba(233,166,60,0.07) 36%, transparent 72%);
    pointer-events: none;
  }
  .floor {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse var(--pool-w, 280px) 40px at var(--lx, 50%) 90%,
      rgba(233,166,60,0.34) 0%, rgba(233,166,60,0.12) 46%, transparent 76%);
    pointer-events: none;
  }
  .horizon {
    position: absolute; left: 6%; right: 6%; bottom: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(233,166,60,0.16), transparent);
    pointer-events: none;
  }

  .orb {
    position: absolute; left: 0; top: 0;
    width: 150px; height: 150px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    will-change: transform;
  }
  .orb::before {
    content: "";
    position: absolute; inset: -120%;
    background: radial-gradient(circle,
      rgba(251,235,196,0.30) 0%, rgba(233,166,60,0.15) 28%, rgba(233,166,60,0.05) 50%, transparent 70%);
    transition: opacity 0.45s ease;
    pointer-events: none;
  }
  .orb.flash::before { opacity: 2.4; transition: opacity 0.05s ease; }
  .orb .faces { position: relative; width: 100%; height: 100%; }
  @keyframes breathe { from { transform: scale(1); } to { transform: scale(1.05); } }
  .orb .faces { animation: breathe 3.8s ease-in-out infinite alternate; }
  .orb img {
    position: absolute; inset: 0; width: 100%;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .orb img.on { opacity: 1; }

  .burst-ring {
    position: absolute; left: 0; top: 0;
    width: 130px; height: 130px; margin: -65px 0 0 -65px;
    border: 2px solid rgba(251,235,196,0.85);
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
  }
  @keyframes ring {
    0%   { transform: scale(0.25); opacity: 0.9; border-width: 3px; }
    100% { transform: scale(2.7);  opacity: 0;   border-width: 1px; }
  }
  .burst-ring.go { animation: ring 0.7s cubic-bezier(0.16, 0.6, 0.4, 1) forwards; }

  .p {
    position: absolute; left: 0; top: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(251,235,196,0.85) 0%, rgba(233,166,60,0.35) 55%, transparent 75%);
    pointer-events: none;
    opacity: 0;
    will-change: transform, opacity;
  }

  .readout {
    display: flex; flex-wrap: wrap; gap: 0 34px;
    padding: 16px 2px 0;
    font-family: var(--data); font-size: 11px;
    letter-spacing: 0.13em; text-transform: uppercase; color: var(--faint);
  }
  .readout b { font-weight: 400; color: var(--warm); font-variant-numeric: tabular-nums; }
  .hint { margin-left: auto; color: var(--faint); }
  @media (max-width: 720px) { .hint { margin-left: 0; flex-basis: 100%; } }

  @media (prefers-reduced-motion: reduce) {
    .orb .faces { animation: none; }
    .burst-ring.go { animation: none; }
  }
</style>

  var pointer = false, t = 0, placed = false, expr = 0, bursts = 0;
  var R = null;

  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  function measure() {
    var r = stage.getBoundingClientRect();
    if (r.width === 0) return false;
    R = { w: r.width, h: r.height };
    if (!placed) { cx = tx = R.w * 0.5; cy = ty = R.h * 0.42; placed = true; }
    return true;
  }

  // ---- pooled trail particles ----
  var POOL = 14, parts = [], pi = 0;
  for (var i = 0; i < POOL; i++) {
    var d = document.createElement("div");
    d.className = "p";
    stage.appendChild(d);
    parts.push({ el: d, life: 0, x: 0, y: 0, dx: 0, dy: 0, s: 10 });
  }
  function spawn(x, y, dx, dy, s, life) {
    var p = parts[pi]; pi = (pi + 1) % POOL;
    p.x = x; p.y = y; p.dx = dx; p.dy = dy; p.s = s;
    p.life = p.maxLife = life;
    p.el.style.width = p.el.style.height = s + "px";
  }
  function stepParticles() {
    for (var i = 0; i < POOL; i++) {
      var p = parts[i];
      if (p.life <= 0) { p.el.style.opacity = "0"; continue; }
      p.life--; p.x += p.dx; p.y += p.dy; p.dy -= 0.015;
      var k = p.life / p.maxLife;
      p.el.style.opacity = (k * 0.7).toFixed(2);
      p.el.style.transform = "translate(" + (p.x - p.s / 2).toFixed(1) + "px," +
                             (p.y - p.s / 2).toFixed(1) + "px) scale(" + (0.5 + k * 0.5).toFixed(2) + ")";
    }
  }

  var lastQx = -1, lastQy = -1, frame = 0;

  function update() {
    if (!R && !measure()) return;
    orb.style.transform = "translate(" + cx.toFixed(1) + "px," + cy.toFixed(1) + "px) translate(-50%,-50%)";
    // quantised: the gradients repaint only when the light moved noticeably
    var qx = Math.round(cx / R.w * 200) / 2, qy = Math.round(cy / R.h * 200) / 2;
    if (qx !== lastQx || qy !== lastQy) {
      wallGlow.style.setProperty("--lx", qx + "%");
      wallGlow.style.setProperty("--ly", qy + "%");
      wallGlow.style.setProperty("--wall-r", Math.round(R.h * 0.62) + "px");
      floor.style.setProperty("--lx", qx + "%");
      floor.style.setProperty("--pool-w", Math.round(clamp(420 - (R.h - cy) * 0.35, 160, 420)) + "px");
      lastQx = qx; lastQy = qy;
    }
  }

  function loop() {
    if (R) {
      if (!pointer && !reduced) {
        t += 0.0042;
        tx = R.w * (0.5 + 0.34 * Math.sin(t * 1.7));
        ty = R.h * (0.38 + 0.16 * Math.sin(t * 2.6 + 0.9));
      }
      var ease = reduced ? 1 : 0.08;
      vx = tx - cx; vy = ty - cy;
      cx += vx * ease; cy += vy * ease;
      // shed light along the way when moving quickly
      if (!reduced && (frame++ % 4 === 0) && Math.hypot(vx, vy) > 30) {
        spawn(cx + (Math.random() - 0.5) * 26, cy + (Math.random() - 0.5) * 26,
              -vx * 0.004, -vy * 0.004 + 0.06, 8 + Math.random() * 12, 46);
      }
      update();
      stepParticles();
    } else {
      measure();
    }
    requestAnimationFrame(loop);
  }

  function setExpr(n) {
    expr = ((n % 6) + 6) % 6;
    for (var i = 0; i < 6; i++) faces[i].classList.toggle("on", i === expr);
    rExpr.textContent = NAMES[expr];
  }

  function burst() {
    bursts++; rBurst.textContent = bursts;
    setExpr(expr + 1);
    ring.style.left = cx + "px"; ring.style.top = cy + "px";
    ring.classList.remove("go"); void ring.offsetWidth; ring.classList.add("go");
    orb.classList.add("flash");
    setTimeout(function () { orb.classList.remove("flash"); }, 140);
    if (!reduced) {
      for (var i = 0; i < 8; i++) {
        var a = i / 8 * Math.PI * 2 + Math.random() * 0.4;
        spawn(cx + Math.cos(a) * 16, cy + Math.sin(a) * 16,
              Math.cos(a) * 2.6, Math.sin(a) * 2.6, 7 + Math.random() * 9, 38);
      }
    }
  }

  function moveTo(e) {
    if (!R && !measure()) return;
    var r = stage.getBoundingClientRect();
    pointer = true;
    tx = clamp(e.clientX - r.left, 10, R.w - 10);
    ty = clamp(e.clientY - r.top, 10, R.h * 0.86);
    if (reduced) { cx = tx; cy = ty; update(); }
  }

  stage.addEventListener("pointermove", moveTo);
  stage.addEventListener("pointerdown", function (e) { moveTo(e); burst(); });
  stage.addEventListener("pointerleave", function () { pointer = false; });

  stage.addEventListener("keydown", function (e) {
    var k = e.key;
    if (k === " " || k === "Enter") { e.preventDefault(); burst(); return; }
    if (k !== "ArrowLeft" && k !== "ArrowRight" && k !== "ArrowUp" && k !== "ArrowDown") return;
    if (!R && !measure()) return;
    e.preventDefault();
    pointer = true;
    var step = 20;
    if (k === "ArrowLeft") tx -= step;
    if (k === "ArrowRight") tx += step;
    if (k === "ArrowUp") ty -= step;
    if (k === "ArrowDown") ty += step;
    tx = clamp(tx, 10, R.w - 10); ty = clamp(ty, 10, R.h * 0.86);
    if (reduced) { cx = tx; cy = ty; update(); }
  });

  window.addEventListener("resize", function () { R = null; measure(); update(); });

  measure(); update();
  requestAnimationFrame(loop);
})();
</script>

<script>
document.addEventListener("keydown", function (e) {
  if (e.key === "Escape") window.location.href = "index.html";
});
</script>
