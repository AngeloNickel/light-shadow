<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Twilight Watch — Produktions-Relikt</title>
<style>
  :root{ --acc:#c9b691; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; }
  body{
    background:#1b1d24;
    transition:background 1.4s ease;
    font-family:Georgia,'Times New Roman',serif;
    color:#e9e2d2;
    -webkit-user-select:none; user-select:none;
    overscroll-behavior:none;
  }
  body[data-state="0"]{ background:#1b1d24; --blobA:#2c3040; --blobB:#23262e; }
  body[data-state="1"]{ background:#2a1f0c; --blobA:#57400f; --blobB:#3d2d10; }
  body[data-state="2"]{ background:#150e29; --blobA:#33204f; --blobB:#241539; }
  body[data-state="3"]{ background:#1f1235; --blobA:#4a3410; --blobB:#33204f; }

  #bgA,#bgB{
    position:fixed; width:70vmax; height:70vmax; border-radius:50%;
    filter:blur(90px); opacity:.5; pointer-events:none;
    transition:background 1.4s ease;
  }
  #bgA{ top:-25vmax; left:-20vmax; background:var(--blobA,#2c3040); }
  #bgB{ bottom:-25vmax; right:-20vmax; background:var(--blobB,#23262e); }

  canvas#c{
    position:fixed; inset:0; width:100%; height:100%;
    display:block; touch-action:none; cursor:grab;
  }
  #vig{
    position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 46%, transparent 52%, rgba(0,0,0,.5) 100%);
  }

  #ui{
    position:fixed; inset:0; pointer-events:none;
    display:flex; flex-direction:column; justify-content:space-between; align-items:center;
    padding:calc(env(safe-area-inset-top,0px) + 18px) 20px calc(env(safe-area-inset-bottom,0px) + 16px);
    text-align:center;
  }
  header h1{
    font-size:clamp(15px,3.6vw,21px); font-weight:400;
    text-transform:uppercase; letter-spacing:.34em; text-indent:.34em;
    color:#efe7d4; text-shadow:0 1px 10px rgba(0,0,0,.6);
  }
  header .rule{
    width:min(220px,52vw); height:1px; margin:9px auto 7px;
    background:linear-gradient(90deg, transparent, var(--acc), transparent);
    opacity:.8; transition:background 1s ease;
  }
  header .sub{
    font-size:clamp(10px,2.4vw,12px); font-style:italic; letter-spacing:.14em;
    color:var(--acc); opacity:.85; transition:color 1s ease;
  }

  footer{ width:100%; max-width:520px; }
  #stateName{
    font-size:clamp(14px,3.4vw,19px); text-transform:uppercase;
    letter-spacing:.3em; text-indent:.3em; color:var(--acc);
    transition:color 1s ease; text-shadow:0 1px 12px rgba(0,0,0,.7);
    animation:swap .55s ease both;
  }
  #stateDesc{
    margin-top:7px; font-style:italic; line-height:1.5;
    font-size:clamp(12px,3vw,14.5px); color:#cfc6b2; opacity:.92;
    text-shadow:0 1px 8px rgba(0,0,0,.7);
    animation:swap .55s ease both; animation-delay:.06s;
  }
  @keyframes swap{
    from{ opacity:0; transform:translateY(7px); filter:blur(3px); }
    to{ opacity:1; transform:none; filter:none; }
  }

  #dots{ margin-top:14px; display:flex; gap:16px; justify-content:center; pointer-events:auto; }
  .dot{
    width:13px; height:13px; border-radius:50%;
    border:1px solid rgba(233,226,210,.4); background:transparent;
    cursor:pointer; padding:0; transition:all .45s ease;
  }
  .dot.on{
    background:var(--acc); border-color:var(--acc);
    box-shadow:0 0 12px var(--acc);
  }
  .dot:not(.on):hover{ border-color:rgba(233,226,210,.85); }

  #hint{
    margin-top:13px; font-size:clamp(10px,2.5vw,11.5px);
    letter-spacing:.06em; color:#a79d88; opacity:.8;
  }
  #hint b{ font-weight:400; color:var(--acc); transition:color 1s ease; }

  #err{
    position:fixed; inset:0; display:none; place-items:center;
    background:#1b1d24; color:#cfc6b2; font-style:italic;
    padding:30px; text-align:center; z-index:9;
  }
</style>
</head>
<body data-state="0">
<div id="bgA"></div><div id="bgB"></div>
<canvas id="c"></canvas>
<div id="vig"></div>

<div id="ui">
  <header>
    <h1>Twilight Watch</h1>
    <div class="rule"></div>
    <div class="sub">Produktions-Relikt&nbsp;&nbsp;·&nbsp;&nbsp;Light / Shadow</div>
  </header>
  <footer>
    <div id="stateName">Ruhezustand</div>
    <div id="stateDesc">Das Relikt ruht — Licht und Schatten schlummern im Gehäuse.</div>
    <div id="dots">
      <button class="dot on" aria-label="Ruhezustand"></button>
      <button class="dot" aria-label="Licht-Zustand"></button>
      <button class="dot" aria-label="Schatten-Zustand"></button>
      <button class="dot" aria-label="Zwielicht"></button>
    </div>
    <div id="hint">Ziehen: drehen&nbsp;·&nbsp;Rad / Pinch: zoomen&nbsp;·&nbsp;<b>Mitte antippen</b>: Zustand wechseln</div>
  </footer>
</div>

<div id="err">Three.js konnte nicht geladen werden — bitte Internetverbindung prüfen und neu laden.</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* Twilight Watch - LIGHT/SHADOW - Three.js r128 */
(function(){
'use strict';
if(!window.THREE){ var er=document.getElementById('err'); if(er){er.style.display='grid';} return; }

var canvas=document.getElementById('c');
var renderer=new THREE.WebGLRenderer({canvas:canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2.5));
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.12;

var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(42, 1, 0.1, 120);
camera.position.set(0, 0.1, 9);

var maxAniso=renderer.capabilities.getMaxAnisotropy();

/* ---------- environment reflections ---------- */
(function(){
  var es=new THREE.Scene();
  es.background=new THREE.Color(0x07070a);
  function panel(w,h,hex,mult,x,y,z){
    var m=new THREE.Mesh(new THREE.PlaneGeometry(w,h), new THREE.MeshBasicMaterial({color:hex}));
    m.material.color.multiplyScalar(mult);
    m.position.set(x,y,z); m.lookAt(0,0,0); es.add(m);
  }
  panel(16,10,0xffe2ae,1.6,-9,9,7);
  panel(3,3,0xffffff,4.5,4,10,9);
  panel(12,4,0x7fd0cf,0.9,10,2,3);
  panel(14,5,0x6a54c8,0.7,-2,-9,4);
  panel(20,12,0x3c3630,0.5,0,2,-11);
  var pm=new THREE.PMREMGenerator(renderer);
  var rt=pm.fromScene(es,0.038);
  scene.environment=rt.texture;
  pm.dispose();
})();

/* ---------- lights ---------- */
var amb=new THREE.AmbientLight(0x3a3d46,0.55); scene.add(amb);
var key=new THREE.DirectionalLight(0xfff1d8,1.05); key.position.set(3,4,6); scene.add(key);
var rim=new THREE.DirectionalLight(0x8fd0d8,0.5); rim.position.set(-5,2,-4); scene.add(rim);
var goldLight=new THREE.PointLight(0xffc46a,0,10,2); goldLight.position.set(0,-0.3,2.6); scene.add(goldLight);
var vioLight=new THREE.PointLight(0x8a5cff,0,10,2); vioLight.position.set(0,-0.4,2.6); scene.add(vioLight);

/* ---------- canvas texture helpers ---------- */
function makeTex(w,h,draw,opts){
  opts=opts||{};
  var c=document.createElement('canvas'); c.width=w; c.height=h;
  draw(c.getContext('2d'),w,h);
  var t=new THREE.CanvasTexture(c);
  t.anisotropy=maxAniso;
  if(!opts.linear) t.encoding=THREE.sRGBEncoding;
  if(opts.repeat){ t.wrapS=THREE.RepeatWrapping; t.wrapT=THREE.RepeatWrapping; t.repeat.set(opts.repeat[0],opts.repeat[1]); }
  return t;
}
function star4Path(g,r,k){
  g.beginPath();
  g.moveTo(0,-r);
  g.quadraticCurveTo(k,-k, r,0);
  g.quadraticCurveTo(k,k, 0,r);
  g.quadraticCurveTo(-k,k, -r,0);
  g.quadraticCurveTo(-k,-k, 0,-r);
  g.closePath();
}

/* ---------- effect textures ---------- */
var softGlowTex=makeTex(256,256,function(g,w,h){
  var gr=g.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);
  gr.addColorStop(0,'rgba(255,255,255,1)');
  gr.addColorStop(0.22,'rgba(255,255,255,0.55)');
  gr.addColorStop(0.55,'rgba(255,255,255,0.16)');
  gr.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=gr; g.fillRect(0,0,w,h);
});
var sparkTex=makeTex(64,64,function(g,w,h){
  var gr=g.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);
  gr.addColorStop(0,'rgba(255,255,255,1)');
  gr.addColorStop(0.25,'rgba(255,255,255,0.9)');
  gr.addColorStop(0.5,'rgba(255,255,255,0.25)');
  gr.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=gr; g.fillRect(0,0,w,h);
});
var starSparkTex=makeTex(128,128,function(g,w,h){
  var c=w/2;
  g.globalCompositeOperation='lighter';
  var gr=g.createRadialGradient(c,c,0,c,c,c*0.5);
  gr.addColorStop(0,'rgba(255,255,255,0.9)');
  gr.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=gr; g.fillRect(0,0,w,h);
  g.translate(c,c);
  [0,Math.PI/2].forEach(function(rot){
    g.save(); g.rotate(rot);
    var lg=g.createLinearGradient(-c,0,c,0);
    lg.addColorStop(0,'rgba(255,255,255,0)');
    lg.addColorStop(0.5,'rgba(255,255,255,0.95)');
    lg.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=lg; g.fillRect(-c,-c*0.05,w,c*0.10);
    g.restore();
  });
});
var smokeTex=makeTex(256,256,function(g,w,h){
  var i,a,rr,x,y,r,gr;
  for(i=0;i<14;i++){
    a=Math.random()*Math.PI*2; rr=Math.random()*w*0.24;
    x=w/2+Math.cos(a)*rr; y=h/2+Math.sin(a)*rr; r=w*(0.14+Math.random()*0.18);
    gr=g.createRadialGradient(x,y,0,x,y,r);
    gr.addColorStop(0,'rgba(255,255,255,'+(0.10+Math.random()*0.08).toFixed(2)+')');
    gr.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=gr; g.beginPath(); g.arc(x,y,r,0,7); g.fill();
  }
});
var raysTex=makeTex(1024,1024,function(g,w,h){
  var c=w/2;
  g.translate(c,c);
  function rnd(i,s){ var v=Math.sin(i*127.1+s*311.7)*43758.5453; return v-Math.floor(v); }
  var i,a,len,wd,lg;
  for(i=0;i<22;i++){
    a=i/22*Math.PI*2+(rnd(i,1)-0.5)*0.22;
    len=c*(0.42+rnd(i,2)*0.5);
    wd=c*(0.014+rnd(i,3)*0.03);
    g.save(); g.rotate(a);
    lg=g.createLinearGradient(c*0.07,0,len,0);
    lg.addColorStop(0,'rgba(255,255,255,'+(0.16+rnd(i,4)*0.3).toFixed(2)+')');
    lg.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=lg; g.fillRect(c*0.07,-wd/2,len,wd);
    g.restore();
  }
  var gr=g.createRadialGradient(0,0,0,0,0,c*0.3);
  gr.addColorStop(0,'rgba(255,255,255,0.5)');
  gr.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=gr; g.fillRect(-c,-c,w,h);
});
var ringTex=makeTex(256,256,function(g,w,h){
  var gr=g.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);
  gr.addColorStop(0.40,'rgba(255,255,255,0)');
  gr.addColorStop(0.47,'rgba(255,255,255,0.9)');
  gr.addColorStop(0.55,'rgba(255,255,255,0)');
  gr.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=gr; g.fillRect(0,0,w,h);
});

/* ---------- dial face (2048px) ---------- */
var dialTex=makeTex(2048,2048,function(g,S){
  var cx=S/2, cy=S/2, R=S*0.492;
  function P(f){ return R*f; }
  var gr=g.createRadialGradient(cx,cy,0,cx,cy,R);
  gr.addColorStop(0,'#f6e9c2'); gr.addColorStop(0.5,'#e7cf98');
  gr.addColorStop(0.8,'#d4ac64'); gr.addColorStop(1,'#bb9150');
  g.fillStyle=gr; g.beginPath(); g.arc(cx,cy,R,0,Math.PI*2); g.fill();
  var i,a,r;
  for(i=0;i<800;i++){
    a=Math.random()*Math.PI*2; r=Math.sqrt(Math.random())*R;
    g.fillStyle='rgba(92,60,22,'+(Math.random()*0.05).toFixed(3)+')';
    g.beginPath(); g.arc(cx+Math.cos(a)*r, cy+Math.sin(a)*r, Math.random()*3+0.6, 0, 7); g.fill();
  }
  var rIn=P(0.82);
  g.save(); g.beginPath(); g.arc(cx,cy,rIn,0,Math.PI*2); g.clip();
  for(i=0;i<28;i++){
    a=i/28*Math.PI*2;
    g.fillStyle= i%2 ? 'rgba(255,241,203,0.15)' : 'rgba(178,128,60,0.10)';
    g.beginPath(); g.moveTo(cx,cy); g.arc(cx,cy,rIn,a,a+Math.PI*2/28); g.closePath(); g.fill();
  }
  gr=g.createRadialGradient(cx,cy,0,cx,cy,rIn);
  gr.addColorStop(0,'rgba(255,246,216,0.85)');
  gr.addColorStop(0.55,'rgba(242,215,152,0.4)');
  gr.addColorStop(1,'rgba(186,144,80,0.75)');
  g.fillStyle=gr; g.fillRect(0,0,S,S);
  function crescentEdge(){
    g.beginPath();
    g.moveTo(cx, cy-rIn);
    g.bezierCurveTo(cx-P(0.30), cy-P(0.36), cx-P(0.30), cy+P(0.36), cx, cy+rIn);
  }
  crescentEdge();
  g.arc(cx,cy,rIn, Math.PI/2, -Math.PI/2, true);
  g.closePath();
  gr=g.createLinearGradient(cx-P(0.30),0,cx+rIn,0);
  gr.addColorStop(0,'#6d5099'); gr.addColorStop(0.45,'#4b3374'); gr.addColorStop(1,'#2a1b47');
  g.fillStyle=gr; g.fill();
  var t,y,xb,xmax,x,sr;
  for(i=0;i<85;i++){
    t=Math.random()*2-1;
    y=cy+t*rIn*0.96;
    xb=cx-P(0.215)*(1-t*t);
    xmax=cx+Math.sqrt(Math.max(0,1-t*t))*rIn*0.97;
    if(xmax-xb<P(0.06)) continue;
    x=xb+P(0.05)+Math.random()*(xmax-xb-P(0.06));
    sr=P(0.006+Math.random()*0.014);
    g.save(); g.translate(x,y);
    g.fillStyle='rgba(226,214,255,'+(0.25+Math.random()*0.6).toFixed(2)+')';
    if(Math.random()<0.25){ g.shadowColor='rgba(200,180,255,0.9)'; g.shadowBlur=14; }
    star4Path(g, sr*2.4, sr*0.5); g.fill();
    g.restore();
  }
  crescentEdge();
  g.strokeStyle='rgba(235,196,118,0.95)'; g.lineWidth=S*0.004; g.stroke();
  g.restore();
  function ring(rr,w2,col){
    g.strokeStyle=col; g.lineWidth=w2;
    g.beginPath(); g.arc(cx,cy,rr,0,Math.PI*2); g.stroke();
  }
  ring(rIn, S*0.005,'rgba(90,58,20,0.85)');
  ring(rIn+S*0.004, S*0.002,'rgba(255,232,180,0.7)');
  ring(P(0.845), S*0.0035,'rgba(120,80,30,0.8)');
  ring(P(0.985), S*0.006,'rgba(90,58,20,0.9)');
  ring(P(0.965), S*0.0018,'rgba(255,232,180,0.55)');
  g.beginPath(); g.arc(cx,cy,R,0,Math.PI*2); g.arc(cx,cy,P(0.845),0,Math.PI*2,true);
  gr=g.createRadialGradient(cx,cy,P(0.845),cx,cy,R);
  gr.addColorStop(0,'rgba(70,45,15,0.25)');
  gr.addColorStop(0.35,'rgba(255,240,200,0.10)');
  gr.addColorStop(1,'rgba(60,38,12,0.35)');
  g.fillStyle=gr; g.fill('evenodd');
  var ca,sa;
  for(i=0;i<60;i++){
    if(i%5===0) continue;
    a=-Math.PI/2+i*Math.PI/30; ca=Math.cos(a); sa=Math.sin(a);
    g.strokeStyle='rgba(96,62,22,0.85)'; g.lineWidth=S*0.0022;
    g.beginPath();
    g.moveTo(cx+ca*P(0.87), cy+sa*P(0.87));
    g.lineTo(cx+ca*P(0.915), cy+sa*P(0.915));
    g.stroke();
  }
  for(i=0;i<12;i++){
    a=-Math.PI/2+i*Math.PI/6; ca=Math.cos(a); sa=Math.sin(a);
    g.strokeStyle='rgba(80,50,16,0.95)'; g.lineWidth=S*0.005;
    g.beginPath();
    g.moveTo(cx+ca*P(0.862), cy+sa*P(0.862));
    g.lineTo(cx+ca*P(0.925), cy+sa*P(0.925));
    g.stroke();
    g.save(); g.translate(cx+ca*P(0.952), cy+sa*P(0.952)); g.rotate(a+Math.PI/2);
    g.fillStyle='#6e4517';
    if(i%3===0){ star4Path(g,P(0.026),P(0.006)); }
    else{
      g.beginPath();
      g.moveTo(0,-P(0.016)); g.lineTo(P(0.011),0);
      g.lineTo(0,P(0.016)); g.lineTo(-P(0.011),0);
      g.closePath();
    }
    g.fill(); g.restore();
  }
  ring(P(0.40),S*0.0022,'rgba(110,72,26,0.7)');
  for(i=0;i<24;i++){
    a=i/24*Math.PI*2;
    g.strokeStyle='rgba(110,72,26,0.55)'; g.lineWidth=S*0.0018;
    g.beginPath();
    g.moveTo(cx+Math.cos(a)*P(0.36), cy+Math.sin(a)*P(0.36));
    g.lineTo(cx+Math.cos(a)*P(0.395), cy+Math.sin(a)*P(0.395));
    g.stroke();
  }
});

/* ---------- rosette (back cover, polar mapping) ---------- */
function drawRosette(pal){
  return function(g,w,h){
    var gr=g.createLinearGradient(0,0,0,h);
    gr.addColorStop(0,pal.bgA); gr.addColorStop(0.5,pal.bgB); gr.addColorStop(1,pal.bgA);
    g.fillStyle=gr; g.fillRect(0,0,w,h);
    function groove(v){
      var y=h*(1-v);
      g.fillStyle=pal.dk; g.fillRect(0,y-3,w,5);
      g.fillStyle=pal.lt; g.fillRect(0,y+2,w,2);
    }
    [0.05,0.10,0.79,0.86,0.97].forEach(groove);
    var bx=w/2, by=h*(1-0.15), ty=h*(1-0.74);
    g.beginPath();
    g.moveTo(bx,by);
    g.bezierCurveTo(bx-70, by-60, bx-74, ty+120, bx, ty);
    g.bezierCurveTo(bx+74, ty+120, bx+70, by-60, bx, by);
    g.closePath();
    g.fillStyle=pal.leaf; g.fill();
    g.lineWidth=6; g.strokeStyle=pal.dk; g.stroke();
    g.beginPath(); g.moveTo(bx,by-14); g.quadraticCurveTo(bx,(by+ty)/2, bx, ty+26);
    g.lineWidth=5; g.strokeStyle=pal.vein; g.stroke();
    [0,w].forEach(function(sx){
      g.beginPath(); g.arc(sx, h*(1-0.24), 26, 0, 7);
      g.fillStyle=pal.leaf; g.fill();
      g.lineWidth=5; g.strokeStyle=pal.dk; g.stroke();
    });
    g.beginPath(); g.arc(w/2, h*(1-0.915), 13, 0, 7);
    g.fillStyle=pal.lt2; g.fill();
    g.lineWidth=4; g.strokeStyle=pal.dk; g.stroke();
  };
}
var roseMap=makeTex(512,512, drawRosette({bgA:'#6f5433',bgB:'#8d6e45',dk:'rgba(42,26,9,0.75)',lt:'rgba(255,226,170,0.30)',leaf:'#95764a',vein:'rgba(50,32,12,0.8)',lt2:'#a8895c'}), {repeat:[12,1]});
var roseBump=makeTex(512,512, drawRosette({bgA:'#7d7d7d',bgB:'#8a8a8a',dk:'#3a3a3a',lt:'#c4c4c4',leaf:'#b0b0b0',vein:'#454545',lt2:'#c0c0c0'}), {repeat:[12,1], linear:true});

/* ---------- laurel vine band (case side) ---------- */
function drawVine(pal){
  return function(g,w,h){
    var gr=g.createLinearGradient(0,0,0,h);
    gr.addColorStop(0,pal.bgA); gr.addColorStop(0.5,pal.bgB); gr.addColorStop(1,pal.bgA);
    g.fillStyle=gr; g.fillRect(0,0,w,h);
    g.strokeStyle=pal.dk; g.lineWidth=7;
    g.beginPath(); g.moveTo(0,h/2);
    var x;
    for(x=0;x<=w;x+=8){ g.lineTo(x, h/2+Math.sin(x/w*Math.PI*2)*14); }
    g.stroke();
    function leaf(lx,flip){
      g.save();
      g.translate(lx, h/2+Math.sin(lx/w*Math.PI*2)*14);
      g.rotate((flip?-1:1)*0.62);

function ribbonGeo(wd,ht,seg,ph){
  var g=new THREE.PlaneGeometry(wd,ht,1,seg);
  g.translate(0,-ht/2,0);
  var pos=g.attributes.position;
  var j,x,y,v,tw,nx,nz;
  for(j=0;j<pos.count;j++){
    x=pos.getX(j); y=pos.getY(j);
    v=-y/ht;
    tw=v*1.1+ph;
    nx=Math.cos(tw)*x; nz=Math.sin(tw)*x;
    nx+=Math.sin(v*3.2+ph*2)*0.06*v;
    nz+=Math.cos(v*2.1+ph)*0.10*v;
    pos.setXYZ(j,nx,y,nz);
  }
  g.computeVertexNormals();
  return g;
}

var rotX=0, rotY=-0.5, tRotX=0, tRotY=-0.5, autoRot=true;
var pointers={}, pcount=0, pinchD=0, zoom=1.0, tZoom=1.0;
var down=false, moved=0, dsx=0, dsy=0, lastX=0, lastY=0, lastT=0, idle=0;
var ray=new THREE.Raycaster(), ndc=new THREE.Vector2();

function pAdd(e){ pointers[e.pointerId]={x:e.clientX,y:e.clientY}; pcount++; }
function pDel(e){ if(pointers[e.pointerId]){ delete pointers[e.pointerId]; pcount--; } }
function pList(){ var a=[],k; for(k in pointers) a.push(pointers[k]); return a; }

canvas.addEventListener('pointerdown',function(e){
  canvas.setPointerCapture(e.pointerId);
  pAdd(e);
  down=true; moved=0; idle=0; autoRot=false;
  dsx=lastX=e.clientX; dsy=lastY=e.clientY; lastT=performance.now();
  if(pcount===2){ var p=pList(); pinchD=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); }
});
canvas.addEventListener('pointermove',function(e){
  if(pointers[e.pointerId]){ pointers[e.pointerId].x=e.clientX; pointers[e.pointerId].y=e.clientY; }
  if(pcount===2){
    var p=pList(), nd=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    if(pinchD>0){ tZoom*=pinchD/nd; tZoom=Math.max(0.55,Math.min(1.9,tZoom)); }
    pinchD=nd; moved+=40; return;
  }
  if(!down) { hoverTest(e); return; }
  var dx=e.clientX-lastX, dy=e.clientY-lastY;
  moved+=Math.abs(e.clientX-dsx)+Math.abs(e.clientY-dsy);
  tRotY+=dx*0.008; tRotX+=dy*0.008;
  tRotX=Math.max(-1.15,Math.min(1.15,tRotX));
  lastX=e.clientX; lastY=e.clientY;
});
function endPtr(e){
  var wasDown=down, mv=moved, dt=performance.now()-lastT;
  pDel(e);
  if(pcount<2) pinchD=0;
  if(pcount===0){
    down=false;
    if(wasDown && mv<9 && dt<420){ tryTap(e); }
    idle=0;
  }
}

/* ---------- helpers ---------- */
function sstep(a,b,x){ var t=Math.max(0,Math.min(1,(x-a)/(b-a))); return t*t*(3-2*t); }
var clock=new THREE.Clock();
var elT=0, entrance=0;

/* ---------- main loop ---------- */
renderer.setAnimationLoop(function(){
  var dt=Math.min(clock.getDelta(),0.05);
  elT+=dt; entrance=Math.min(1,entrance+dt/1.1);
  var e1=1-Math.exp(-3.4*dt);
  var t=T[state], k;
  for(k in t){ P[k]+=(t[k]-P[k])*e1; }

  /* lights */
  key.intensity=P.keyI;
  amb.intensity=P.ambI;
  tmpC.setHex(KEYC[state]); key.color.lerp(tmpC,e1);
  tmpC.setHex(AMBC[state]); amb.color.lerp(tmpC,e1);
  goldLight.intensity=P.goldI;
  vioLight.intensity=P.vioI;
  goldLight.position.x=(state===3?-1.35:0)*sstep(0,1,P.tw)+ (1-sstep(0,1,P.tw))*0;
  vioLight.position.x=(state===3?1.35:0)*sstep(0,1,P.tw);

  /* case tint / darkening (shadow) */
  var dk=P.dark;
  for(i=0;i<tintMats.length;i++){
    var mm=tintMats[i];
    tmpC.copy(mm.userData.base).multiplyScalar(1-0.34*dk);
    tmpC.lerp(darkTint, 0.28*dk);
    mm.color.copy(tmpC);
  }

  /* star + medallion twin emissive (gold left of seam, violet right) */
  M.star.emissive.copy(STAR_GOLD);
  var act=Math.max(P.li,P.sh,P.tw);
  var spls=0.85+0.15*Math.sin(elT*2.4);
  M.star.emissiveIntensity=P.starE*spls;
  starVMat.emissiveIntensity=P.starE*spls;

  /* full-face attunement dials */
  lightDialMat.opacity=P.dOp; shadowDialMat.opacity=P.dOp;
  lightDialMat.emissiveIntensity=0.10+0.32*P.li;
  shadowDialMat.emissiveIntensity=0.14+0.42*P.sh;

  /* accent ring */
  accMat.color.set(ACCC[state]);
  accMat.opacity=0.10+act*0.22*(0.6+0.4*Math.sin(elT*3.1));

  /* dial overlays */
  oGL.material.opacity=P.gGL*0.9; oGR.material.opacity=P.gGR*0.9;
  oVL.material.opacity=P.vVL*0.9; oVR.material.opacity=P.vVR*0.9;

  /* glows */
  glowGold.material.opacity=P.glowG*(0.75+0.25*Math.sin(elT*1.7));
  glowGold.position.x=P.glowGx; glowGold.scale.setScalar(4.6+P.glowG*1.1);
  glowVio.material.opacity=P.glowV*(0.72+0.28*Math.sin(elT*1.9+1));
  glowVio.position.x=P.glowVx; glowVio.scale.setScalar(4.6+P.glowV*1.1);

  /* rays */
  rays1.material.opacity=P.raysO*(0.6+0.12*Math.sin(elT*2)); rays1.material.rotation=elT*0.16;
  rays2.material.opacity=P.raysO*0.7; rays2.material.rotation=-elT*0.22;
  vHalo.material.opacity=P.vHaloO*(0.55+0.14*Math.sin(elT*1.5)); vHalo.material.rotation=-elT*0.12;

  /* gold sparks rise */
  var spP=sparks.geometry.attributes.position.array, sp;
  sparks.material.opacity=Math.max(P.li,P.tw*0.85)*0.9;
  for(i=0;i<SPN;i++){
    sp=spD[i]; sp.y+=sp.sp*dt; sp.a+=sp.rs*dt;
    if(sp.y>1.9){ sp.y=-1.6; sp.a=Math.random()*6.283; }
    var rr=sp.r*(1-sstep(-1.6,1.9,sp.y)*0.5);
    spP[i*3]=Math.cos(sp.a)*rr; spP[i*3+1]=sp.y; spP[i*3+2]=Math.sin(sp.a)*rr*0.7;
  }
  sparks.geometry.attributes.position.needsUpdate=true;

  /* violet particles fall / spiral */
  var flP=fall.geometry.attributes.position.array, fp;
  fall.material.opacity=Math.max(P.sh,P.tw*0.85)*0.85;
  for(i=0;i<FLN;i++){
    fp=flD[i]; fp.y-=fp.sp*dt; fp.a+=fp.rs*dt;
    if(fp.y<-1.7){ fp.y=1.8; }
    var fr=fp.r*(0.6+sstep(-1.7,1.8,fp.y)*0.7);
    flP[i*3]=Math.cos(fp.a)*fr; flP[i*3+1]=fp.y; flP[i*3+2]=Math.sin(fp.a)*fr*0.7;
  }
  fall.geometry.attributes.position.needsUpdate=true;

  /* twilight orbit ring (two tilted rings, gold->violet) */
  var orP=orbit.geometry.attributes.position.array;
  var orC=orbit.geometry.attributes.color.array;
  orbit.material.opacity=P.orbitO*0.95;
  for(i=0;i<ORN;i++){
    var o=orD[i]; o.a+=o.w*dt*0.6;
    var ca=Math.cos(o.a), sa=Math.sin(o.a);
    var ex=ca*o.r, ey=sa*o.r, ez=0;
    var tilt=o.ring? 0.5 : -0.5;
    var yy=ey*Math.cos(tilt)+o.yj;
    var zz=ey*Math.sin(tilt);
    orP[i*3]=ex; orP[i*3+1]=yy; orP[i*3+2]=zz+ (o.ring?0.1:-0.1);
    var mix=sstep(-o.r,o.r,ex);
    tmpC.copy(GOLD_P).lerp(VIO_P,mix);
    orC[i*3]=tmpC.r; orC[i*3+1]=tmpC.g; orC[i*3+2]=tmpC.b;
  }
  orbit.geometry.attributes.position.needsUpdate=true;
  orbit.geometry.attributes.color.needsUpdate=true;

  /* smoke wisps (shadow / twilight) */
  var wO=Math.max(P.wispO, P.tw*0.5);
  var wShift=P.wispX;
  for(i=0;i<wisps.length;i++){
    var wq=wisps[i]; wq.a+=wq.av*dt;
    var wy=((elT*wq.sw*0.35+wq.ph)%1);
    var yPos=-1.2+wy*3.0;
    var fade=Math.sin(wy*Math.PI);
    var wr=wq.r*(0.7+wy*0.6);
    wq.s.position.set(Math.cos(wq.a)*wr*0.6 + wShift*sstep(0,1,P.tw), yPos, Math.sin(wq.a)*wr*0.5 - 0.4);
    var sc=wq.sc*(0.8+wy*1.3);
    wq.s.scale.set(sc,sc,1);
    wq.s.material.opacity=wO*fade*0.5;
  }

  /* dust motes (always faintly present) */
  var duP=dust.geometry.attributes.position.array, du;
  dust.material.opacity=0.16+P.dustB*0.3;
  for(i=0;i<DUN;i++){
    du=duD[i];
    du.y+=du.sp*dt*0.3;
    if(du.y>3.2) du.y=-3.2;
    duP[i*3]=du.x+Math.sin(elT*0.4+du.ph)*0.15;
    duP[i*3+1]=du.y;
    duP[i*3+2]=du.z;
  }
  dust.geometry.attributes.position.needsUpdate=true;

  /* twinkles */
  for(i=0;i<twk.length;i++){
    var tw2=twk[i];
    var cyc=(elT*tw2.sp+tw2.ph)%1;
    if(cyc<tw2.prev){ twkPos(tw2); }
    tw2.prev=cyc;
    var tf=Math.sin(cyc*Math.PI);
    tw2.s.material.opacity=tf*act*0.9;
    var tsc=tw2.sc*(0.4+tf*0.8);
    tw2.s.scale.set(tsc,tsc,1);
    tw2.s.material.rotation=elT*0.5+i;
  }

  /* bursts on state change */
  for(i=bursts.length-1;i>=0;i--){
    var b=bursts[i]; b.t+=dt;
    var bp=Math.min(1,b.t/0.7);
    var ease=1-Math.pow(1-bp,3);
    var bs=0.7+ease*4.2;
    b.s.scale.set(bs,bs,1);
    b.s.material.opacity=0.85*(1-bp);
    if(bp>=1){ fx.remove(b.s); b.s.material.dispose(); bursts.splice(i,1); }
  }

  /* rotation + idle auto-spin */
  idle+=dt;
  if(idle>3 && pcount===0 && !down){ autoRot=true; }
  if(autoRot){ tRotY+=dt*0.10; }
  var e2=1-Math.exp(-8*dt);
  rotX+=(tRotX-rotX)*e2;
  rotY+=(tRotY-rotY)*e2;
  var bob=Math.sin(elT*0.9)*0.03;
  var sway=Math.sin(elT*0.6)*0.02;
  watch.rotation.set(rotX, rotY, sway);
  watch.position.y=-0.55+bob;
  fx.position.y=-0.55+bob;

  /* entrance pop */
  var es=0.8+0.2*(entrance*entrance*(3-2*entrance));
  watch.scale.setScalar(es);

  /* sweep seam follows the watch orientation */
  axW.set(1,0,0).applyQuaternion(watch.quaternion);
  var dAx=axW.dot(watch.position);
  clipPG.normal.set(-axW.x,-axW.y,-axW.z);
  clipPG.constant=dAx+P.clip*es;
  clipPV.normal.copy(axW);
  clipPV.constant=-(dAx+P.clip*es);

  /* camera zoom fit */
  zoom+=(tZoom-zoom)*e2;
  var vFOV=camera.fov*Math.PI/180;
  var fitZ=Math.max(3.4/Math.tan(vFOV/2), 2.4/(Math.tan(vFOV/2)*camera.aspect));
  fitZ=Math.max(7.2,Math.min(12.8,fitZ));
  camera.position.z=fitZ*zoom;
  camera.position.y=0.1;
  camera.lookAt(0,-0.05,0);

  /* subtle star scale pulse */
  var sp2=1+act*0.03*Math.sin(elT*3);
  if(starMesh){ starMesh.scale.set(sp2,sp2,1); }
  if(starVMesh){ starVMesh.scale.set(sp2,sp2,1); }

  renderer.render(scene,camera);
});

setState(0,true);
})();
</script>
<script>
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') window.location.href = 'index.html';
});
</script>
</body>
